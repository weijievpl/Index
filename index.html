<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR 粒子：手势缩放控制</title>
    
    <!-- 引入 MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background-color: #000; overflow: hidden; font-family: sans-serif; }

        /* 1. 视频背景层 */
        #video-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 0;
            transform: scaleX(-1); /* 默认镜像 */
        }

        /* 2. 骨骼调试层 (半透明) */
        #skeleton-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }

        /* 3. 粒子特效层 */
        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2;
        }

        /* UI */
        .controls {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; flex-wrap: wrap; gap: 8px;
            z-index: 10;
        }
        .btn {
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff; padding: 10px 15px; border-radius: 20px; font-size: 14px;
            backdrop-filter: blur(4px);
            cursor: pointer;
        }
        .btn-start { background: #2ed573; border: none; font-weight: bold; }
        .status {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
            text-align: center; z-index: 20; max-width: 80%;
            display: block;
        }
        .loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white;
        }
    </style>
</head>
<body>

    <!-- 视频源 -->
    <video id="video-bg" playsinline></video>
    <!-- 骨骼层 -->
    <canvas id="skeleton-canvas"></canvas>
    <!-- 粒子层 -->
    <canvas id="particle-canvas"></canvas>

    <div id="status-box" class="status">
        <h3>准备就绪</h3>
        <p>点击"🚀 启动"开始</p>
        <small>请保持手在画面内，光线充足</small>
    </div>

    <div class="controls">
        <button class="btn btn-start" id="startBtn">🚀 启动 / 重试</button>
        <button class="btn" id="switchCamBtn">🔄 切换镜头</button>
        <button class="btn" onclick="setPattern('text')">🅰 文字</button>
        <button class="btn" onclick="setPattern('heart')">❤ 心形</button>
        <label class="btn">
            🖼 导入
            <input type="file" id="imgUpload" accept="image/*" style="display:none">
        </label>
    </div>

    <!-- 加载动画 -->
    <div id="loadingScreen" class="loading">
        <h2>加载中...</h2>
        <p>正在初始化 AI 模型</p>
        <p id="loadingText">请稍候，首次加载需下载约20MB资源</p>
        <div style="width: 200px; height: 4px; background: #333; margin-top: 20px; border-radius: 2px;">
            <div id="loadingBar" style="width: 0%; height: 100%; background: #2ed573; border-radius: 2px; transition: width 0.3s;"></div>
        </div>
    </div>

<script>
    const videoElement = document.getElementById('video-bg');
    const pCanvas = document.getElementById('particle-canvas');
    const pCtx = pCanvas.getContext('2d');
    const sCanvas = document.getElementById('skeleton-canvas');
    const sCtx = sCanvas.getContext('2d');
    const statusBox = document.getElementById('status-box');
    const loadingScreen = document.getElementById('loadingScreen');
    const loadingBar = document.getElementById('loadingBar');
    const loadingText = document.getElementById('loadingText');

    // 检测设备类型
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    // 适配屏幕
    function resize() {
        pCanvas.width = sCanvas.width = window.innerWidth;
        pCanvas.height = sCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- 全局状态 ---
    let particles = [];
    let isCameraRunning = false;
    let currentFacingMode = 'user'; // 'user' 前置, 'environment' 后置
    
    // 根据设备调整粒子密度
    let gap;
    if (isMobile) {
        gap = window.innerWidth < 600 ? 8 : 6; // 手机端粒子密度适中
    } else {
        gap = 3; // 桌面端高密度
    }

    // 手势状态
    const handState = {
        x: -1000, y: -1000, // 食指位置
        active: false,
        spread: 0, // 张开程度
        scale: 1, // 当前粒子缩放倍率
        targetScale: 1 // 目标缩放倍率
    };

    // --- 1. MediaPipe AI 初始化 ---
    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    // 设置加载进度
    let loadProgress = 0;
    const progressInterval = setInterval(() => {
        if (loadProgress < 90) {
            loadProgress += 10;
            loadingBar.style.width = `${loadProgress}%`;
            loadingText.textContent = `正在下载 AI 模型... ${loadProgress}%`;
        }
    }, 300);

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0, // ⭐ 0=最快模式，移动设备必须
        minDetectionConfidence: 0.4, // ⭐ 降低检测阈值
        minTrackingConfidence: 0.4,   // ⭐ 降低跟踪阈值
        selfieMode: true // 自拍模式优化
    });

    hands.onResults(onResults);

    // 模型加载完成
    hands.initialize().then(() => {
        clearInterval(progressInterval);
        loadingBar.style.width = '100%';
        loadingText.textContent = 'AI 模型加载完成！';
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            statusBox.style.display = 'block';
        }, 500);
    }).catch(err => {
        console.error('AI模型加载失败:', err);
        loadingText.innerHTML = '❌ AI模型加载失败<br>请刷新页面重试';
        loadingText.style.color = '#ff6b6b';
    });

    // --- 2. 摄像头控制 (移动端优化) ---
    async function startCamera() {
        statusBox.innerHTML = "⌛ 正在启动摄像头...<br>请稍候...";
        statusBox.style.display = 'block';
        
        // 停止之前的流
        if (videoElement.srcObject) {
            videoElement.srcObject.getTracks().forEach(t => t.stop());
        }

        // 调整镜像：前置需要镜像，后置不需要
        const isFrontCamera = currentFacingMode === 'user';
        videoElement.style.transform = isFrontCamera ? 'scaleX(-1)' : 'scaleX(1)';
        
        try {
            // 移动设备专用配置
            const constraints = {
                video: {
                    facingMode: currentFacingMode,
                    width: isMobile ? { ideal: 480, max: 640 } : { ideal: 640 },
                    height: isMobile ? { ideal: 360, max: 480 } : { ideal: 480 },
                    frameRate: isMobile ? { ideal: 15, max: 30 } : { ideal: 30 }
                }
            };
            
            // 获取摄像头权限
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            videoElement.srcObject = stream;
            
            // 等待视频就绪
            await new Promise(resolve => {
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    resolve();
                };
            });
            
            isCameraRunning = true;
            
            // 显示连接成功的提示
            statusBox.innerHTML = "✅ 摄像头已启动<br>请将手放在画面中央<br>确保光线充足";
            statusBox.style.backgroundColor = 'rgba(0,0,0,0.7)';
            
            // 2秒后隐藏提示
            setTimeout(() => {
                statusBox.style.display = 'none';
            }, 2000);
            
            // 开始检测循环
            detectLoop();
            
        } catch (err) {
            console.error("摄像头错误:", err);
            let errorMsg = `❌ 摄像头错误: ${err.message || err}<br><br>`;
            
            if (err.name === 'NotAllowedError') {
                errorMsg += "请允许摄像头权限<br>1. 点击地址栏的摄像头图标<br>2. 选择'允许'";
            } else if (err.name === 'NotFoundError') {
                errorMsg += "未找到摄像头<br>请检查设备摄像头";
            } else if (err.name === 'NotReadableError') {
                errorMsg += "摄像头被占用<br>请关闭其他使用摄像头的应用";
            } else {
                errorMsg += "请确保：<br>1. 使用 HTTPS 访问<br>2. 使用 Chrome/Edge/Safari 浏览器<br>3. 检查摄像头是否可用";
            }
            
            statusBox.innerHTML = errorMsg;
            statusBox.style.backgroundColor = 'rgba(200,0,0,0.8)';
        }
    }

    // 检测循环函数
    async function detectLoop() {
        if (!isCameraRunning) return;
        
        try {
            // 发送当前帧到 MediaPipe
            await hands.send({image: videoElement});
            
            // 移动设备上适当降低帧率以节省性能
            const delay = isMobile ? 100 : 50;
            setTimeout(detectLoop, delay);
        } catch (err) {
            console.error("检测错误:", err);
        }
    }

    // --- 3. AI 结果处理 & 手势逻辑 ---
    function onResults(results) {
        // 清空骨骼画布
        sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
        
        // 显示检测状态
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            statusBox.style.display = 'none'; // 检测到手时隐藏提示
            const landmarks = results.multiHandLandmarks[0];
            
            // A. 绘制骨骼 (用更明显的颜色)
            sCtx.lineWidth = isMobile ? 4 : 3;
            sCtx.strokeStyle = '#00FF88';
            sCtx.fillStyle = '#FF5500';
            
            // 绘制连接线
            if (HAND_CONNECTIONS) {
                sCtx.beginPath();
                HAND_CONNECTIONS.forEach(([start, end]) => {
                    const startPoint = landmarks[start];
                    const endPoint = landmarks[end];
                    
                    if (startPoint && endPoint) {
                        let startX = startPoint.x * sCanvas.width;
                        let endX = endPoint.x * sCanvas.width;
                        
                        // 镜像处理
                        if (currentFacingMode === 'user') {
                            startX = sCanvas.width - startX;
                            endX = sCanvas.width - endX;
                        }
                        
                        const startY = startPoint.y * sCanvas.height;
                        const endY = endPoint.y * sCanvas.height;
                        
                        sCtx.moveTo(startX, startY);
                        sCtx.lineTo(endX, endY);
                    }
                });
                sCtx.stroke();
            }
            
            // 绘制关节点
            landmarks.forEach(point => {
                let x = point.x * sCanvas.width;
                const y = point.y * sCanvas.height;
                
                // 镜像处理
                if (currentFacingMode === 'user') {
                    x = sCanvas.width - x;
                }
                
                sCtx.beginPath();
                sCtx.arc(x, y, isMobile ? 6 : 5, 0, Math.PI * 2);
                sCtx.fill();
            });
            
            // B. 计算食指位置
            const indexFinger = landmarks[8];
            const indexFingerBase = landmarks[5]; // 食指根部，用于验证
            
            // 验证检测质量：食指尖端和根部应该有一定距离
            const fingerLength = Math.sqrt(
                Math.pow(indexFinger.x - indexFingerBase.x, 2) + 
                Math.pow(indexFinger.y - indexFingerBase.y, 2)
            );
            
            // 如果手指长度太短，可能是误检测
            if (fingerLength < 0.05) {
                handState.active = false;
                statusBox.style.display = 'block';
                statusBox.innerHTML = "🖐️ 手指检测不完整<br>请伸直手指并保持稳定";
                return;
            }
            
            let ix = indexFinger.x;
            let iy = indexFinger.y;
            
            // 镜像处理
            if (currentFacingMode === 'user') {
                ix = 1 - ix; // 水平镜像
            }
            
            handState.x = ix * pCanvas.width;
            handState.y = iy * pCanvas.height;
            handState.active = true;
            
            // C. 计算手掌张开程度 (优化算法)
            const wrist = landmarks[0];
            const tips = [4, 8, 12, 16, 20];
            let totalDist = 0;
            let validTips = 0;
            
            tips.forEach(idx => {
                const tip = landmarks[idx];
                const dx = tip.x - wrist.x;
                const dy = tip.y - wrist.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                // 忽略异常值
                if (dist > 0.05 && dist < 0.5) {
                    totalDist += dist;
                    validTips++;
                }
            });
            
            if (validTips > 3) { // 至少4个有效指尖
                const avgDist = totalDist / validTips;
                
                // 动态阈值调整（适应不同距离）
                const openThreshold = 0.28 + Math.min(fingerLength * 2, 0.07);
                const closeThreshold = 0.15 + Math.min(fingerLength * 2, 0.05);
                
                if (avgDist > openThreshold) {
                    handState.targetScale = 1.8; 
                } else if (avgDist < closeThreshold) {
                    handState.targetScale = 0.4;
                } else {
                    handState.targetScale = 1.0;
                }
            }
            
        } else {
            handState.active = false;
            handState.targetScale = 1.0;
            
            // 如果检测不到手，显示引导提示
            if (isCameraRunning) {
                statusBox.style.display = 'block';
                statusBox.innerHTML = "👋 等待检测到手<br><br>" +
                    "使用技巧：<br>" +
                    "1. 将手放在画面中央<br>" +
                    "2. 确保光线充足<br>" +
                    "3. 手势稳定2秒钟<br>" +
                    "4. 距离摄像头约30-50cm";
                statusBox.style.backgroundColor = 'rgba(0,0,0,0.7)';
            }
        }
    }

    // --- 4. 粒子系统 ---
    class Particle {
        constructor(x, y, color) {
            // 原始坐标（归一化保存，方便缩放）
            this.baseX = x; 
            this.baseY = y;
            // 实际显示坐标
            this.x = Math.random() * pCanvas.width;
            this.y = Math.random() * pCanvas.height;
            this.color = color;
            this.size = Math.random() * 2 + 1;
            this.vx = 0;
            this.vy = 0;
            this.friction = 0.9;
            this.ease = 0.15;
        }

        update() {
            // 1. 处理缩放 (Lerp 插值实现平滑缩放)
            // 将图案中心定在屏幕中心
            const centerX = pCanvas.width / 2;
            const centerY = pCanvas.height / 2;
            
            // 计算当前粒子应该在的目标位置 (基于缩放)
            const targetX = (this.baseX - centerX) * handState.scale + centerX;
            const targetY = (this.baseY - centerY) * handState.scale + centerY;

            // 2. 物理交互 (食指拨动)
            if (handState.active) {
                const dx = handState.x - this.x;
                const dy = handState.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 80) { // 感应半径
                    const angle = Math.atan2(dy, dx);
                    const force = (80 - dist) / 80;
                    const power = isMobile ? 20 : 25; // 移动设备上力稍小
                    
                    this.vx -= Math.cos(angle) * force * power;
                    this.vy -= Math.sin(angle) * force * power;
                }
            }

            // 3. 回归逻辑
            this.vx += (targetX - this.x) * this.ease;
            this.vy += (targetY - this.y) * this.ease;

            this.vx *= this.friction;
            this.vy *= this.friction;

            this.x += this.vx;
            this.y += this.vy;
        }

        draw() {
            pCtx.fillStyle = this.color;
            pCtx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    // 图案生成逻辑 (扫描)
    function scanPattern(sourceCtx, w, h) {
        particles = [];
        const data = sourceCtx.getImageData(0, 0, w, h).data;
        for(let y=0; y<h; y+=gap) {
            for(let x=0; x<w; x+=gap) {
                const i = (y*w+x)*4;
                if(data[i+3] > 128) {
                    const r = data[i]; const g = data[i+1]; const b = data[i+2];
                    particles.push(new Particle(x, y, `rgba(${r},${g},${b},0.9)`));
                }
            }
        }
    }

    // 设置图案
    function setPattern(type) {
        const tC = document.createElement('canvas');
        tC.width = pCanvas.width; tC.height = pCanvas.height;
        const tCtx = tC.getContext('2d');

        if(type === 'text') {
            tCtx.fillStyle = '#00ffff';
            tCtx.font = 'bold 20vw Arial';
            tCtx.textAlign = 'center'; tCtx.textBaseline = 'middle';
            tCtx.fillText('HAND', pCanvas.width/2, pCanvas.height/2);
        } else if (type === 'heart') {
            tCtx.fillStyle = '#ff3838';
            tCtx.translate(pCanvas.width/2, pCanvas.height/2);
            const s = Math.min(pCanvas.width, pCanvas.height)/35;
            tCtx.beginPath();
            for(let i=0; i<=Math.PI*2; i+=0.05){
                const x = 16*Math.pow(Math.sin(i),3);
                const y = -(13*Math.cos(i)-5*Math.cos(2*i)-2*Math.cos(3*i)-Math.cos(4*i));
                tCtx.lineTo(x*s, y*s);
            }
            tCtx.fill();
        }
        scanPattern(tCtx, pCanvas.width, pCanvas.height);
    }

    // 导入图片
    document.getElementById('imgUpload').addEventListener('change', (e) => {
        const f = e.target.files[0];
        if(f) {
            const r = new FileReader();
            r.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const tC = document.createElement('canvas');
                    tC.width = pCanvas.width; tC.height = pCanvas.height;
                    const tCtx = tC.getContext('2d');
                    const scale = Math.min(pCanvas.width/img.width, pCanvas.height/img.height)*0.6;
                    const w = img.width*scale; const h = img.height*scale;
                    tCtx.drawImage(img, (pCanvas.width-w)/2, (pCanvas.height-h)/2, w, h);
                    scanPattern(tCtx, pCanvas.width, pCanvas.height);
                }
                img.src = ev.target.result;
            }
            r.readAsDataURL(f);
        }
    });

    // --- 动画循环 ---
    let lastFrameTime = 0;
    const targetFPS = isMobile ? 30 : 60;

    function animate(timestamp) {
        // 限制移动设备帧率
        if (isMobile && timestamp - lastFrameTime < 1000 / targetFPS) {
            requestAnimationFrame(animate);
            return;
        }
        lastFrameTime = timestamp;
        
        pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        
        // 平滑过渡缩放值（移动设备更平滑）
        const smoothing = isMobile ? 0.05 : 0.1;
        handState.scale += (handState.targetScale - handState.scale) * smoothing;
        
        // 优化粒子绘制（移动设备分批更新）
        const batchSize = particles.length;
        for (let i = 0; i < batchSize; i++) {
            const p = particles[i];
            if (p) {
                p.update();
                p.draw();
            }
        }
        
        // 绘制食指高亮圈（仅在检测到时）
        if (handState.active) {
            // 更明显的交互指示器
            pCtx.beginPath();
            pCtx.arc(handState.x, handState.y, 25, 0, Math.PI * 2);
            pCtx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            pCtx.fill();
            
            pCtx.beginPath();
            pCtx.arc(handState.x, handState.y, 20, 0, Math.PI * 2);
            pCtx.strokeStyle = '#00FFAA';
            pCtx.lineWidth = 3;
            pCtx.stroke();
            
            // 显示当前手势状态（移动设备上字体更大）
            pCtx.fillStyle = '#FFFFFF';
            pCtx.font = isMobile ? '18px Arial' : '16px Arial';
            pCtx.shadowColor = 'black';
            pCtx.shadowBlur = 3;
            
            let txt = "✋ 正常";
            if (handState.targetScale > 1.2) txt = "🖐 张开 (放大)";
            if (handState.targetScale < 0.8) txt = "✊ 握拳 (缩小)";
            
            pCtx.fillText(txt, handState.x + 35, handState.y);
            pCtx.shadowBlur = 0;
        }
        
        requestAnimationFrame(animate);
    }

    // --- 事件绑定 ---
    document.getElementById('startBtn').addEventListener('click', async () => {
        statusBox.innerHTML = "🔄 启动摄像头...";
        statusBox.style.display = 'block';
        await startCamera();
    });
    
    document.getElementById('switchCamBtn').addEventListener('click', () => {
        currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
        // 更新MediaPipe的自拍模式设置
        hands.setOptions({ selfieMode: currentFacingMode === 'user' });
        
        // 如果摄像头正在运行，需要重启以应用切换
        if (isCameraRunning) {
            startCamera();
        }
    });

    // 添加页面可见性监听（防止息屏后摄像头失效）
    document.addEventListener('visibilitychange', () => {
        if (document.hidden && isCameraRunning) {
            // 页面隐藏时暂停摄像头
            videoElement.pause();
        } else if (isCameraRunning) {
            // 页面恢复时重启摄像头
            videoElement.play().catch(() => {
                startCamera();
            });
        }
    });

    // 添加触摸事件支持（移动设备）
    pCanvas.addEventListener('touchstart', (e) => {
        if (handState.active) {
            // 防止页面滚动
            e.preventDefault();
        }
    }, { passive: false });

    // 添加加载完成提示
    window.addEventListener('load', () => {
        setTimeout(() => {
            if (!isCameraRunning) {
                statusBox.innerHTML = "👆 点击下方绿色按钮启动<br><br>" +
                    "使用说明：<br>" +
                    "1. 点击「🚀 启动」<br>" +
                    "2. 允许摄像头权限<br>" +
                    "3. 将手放入画面<br>" +
                    "4. 张开/握拳控制缩放<br>" +
                    "5. 食指拨动粒子";
                statusBox.style.display = 'block';
            }
        }, 1000);
    });

    // 初始化
    setPattern('text');
    animate();

    // iOS特殊处理
    if (isIOS) {
        // iOS需要特殊处理自动播放
        document.addEventListener('touchstart', () => {
            if (!isCameraRunning) {
                videoElement.play().catch(e => console.log('iOS自动播放阻止:', e));
            }
        }, { once: true });
    }

</script>
</body>
</html>
